<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xfxfc</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      overflow: hidden;
      background: #0a0a0a;
      position: relative;
    }

    /* Nowe tło ze zdjęcia best.jpg */
    .background-image {
      position: fixed;
      inset: 0;
      background-image: url('best.jpg');
      background-size: cover;        /* zdjęcie wypełni cały ekran */
      background-position: center;   /* wyśrodkowane */
      background-repeat: no-repeat;
      z-index: -2;                   /* pod wszystkim */
      filter: brightness(0.65);      /* opcjonalnie przyciemniam, żeby tekst był czytelny */
    }

    /* Zachowuję delikatny gradient animowany jako nakładkę (żeby było ładniej) */
    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(-45deg, rgba(10,10,10,0.85), rgba(26,26,26,0.75), rgba(15,15,15,0.8));
      background-size: 400% 400%;
      animation: gradientShift 35s ease infinite;
      z-index: -1;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .content {
      position: relative;
      z-index: 10;
    }
  </style>
</head>
<body class="text-zinc-200 flex items-center justify-center relative">

  <!-- Nowe tło ze zdjęcia -->
  <div class="background-image"></div>
  
  <!-- Delikatna animowana nakładka -->
  <div class="overlay"></div>

  <div class="content text-center px-6 max-w-md mx-auto">
    <img src="spiffo.jpg"
         alt="xfxfc"
         class="w-40 h-40 mx-auto rounded-3xl object-cover border-4 border-zinc-800 shadow-2xl mb-10">

    <h1 class="text-7xl font-light tracking-tighter mb-2">
      xfxfc
    </h1>
    <p class="text-zinc-400 text-xl mb-1">Welcome!</p>
   
    <p class="text-zinc-500 text-lg leading-relaxed max-w-xs mx-auto">
      maybe someday I will become a programmer
    </p>

    <div class="flex justify-center gap-10 mt-16 text-4xl">
      <a href="https://www.youtube.com/@xfxfc/featured" target="_blank"
         class="hover:text-red-500 transition-colors duration-300">
        <i class="fab fa-youtube"></i>
      </a>
      <a href="https://github.com/lewy3" target="_blank"
         class="hover:text-white transition-colors duration-300">
        <i class="fab fa-github"></i>
      </a>
      <a href="https://open.spotify.com/user/31v6vltmxpdibbqtckfwrj5ornuu?si=2655e6d5ea9446ce" target="_blank"
         class="hover:text-green-500 transition-colors duration-300">
        <i class="fab fa-spotify"></i>
      </a>
    </div>
  </div>

  <!-- Przycisk muzyki -->
  <div id="musicBtn"
       class="absolute bottom-8 left-8 w-12 h-12 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-full flex items-center justify-center text-xl cursor-pointer transition-all active:scale-90">
    <i id="musicIcon" class="fas fa-play"></i>
  </div>

  <audio id="bgMusic" autoplay loop>
    <source src="cloud.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById('bgMusic');
    const btn = document.getElementById('musicBtn');
    const icon = document.getElementById('musicIcon');
    let isPlaying = false;

    btn.addEventListener('click', () => {
      if (isPlaying) {
        audio.pause();
        icon.classList.replace('fa-pause', 'fa-play');
      } else {
        audio.play().catch(() => console.log("Autoplay blocked"));
        icon.classList.replace('fa-play', 'fa-pause');
      }
      isPlaying = !isPlaying;
    });
  </script>
</body>
</html>
